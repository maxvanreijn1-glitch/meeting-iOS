<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Create your Meetings Managed account" />
  <title>Sign Up – Meetings Managed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:       #f5f7fa;
      --color-surface:  #ffffff;
      --color-primary:  #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-text:     #111827;
      --color-muted:    #6b7280;
      --color-border:   #d1d5db;
      --color-error:    #dc2626;
      --color-success:  #16a34a;
      --radius:         12px;
      --shadow:         0 4px 24px rgba(0,0,0,.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg:      #0f172a;
        --color-surface: #1e293b;
        --color-text:    #f1f5f9;
        --color-muted:   #94a3b8;
        --color-border:  #334155;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: env(safe-area-inset-top, 24px) 16px env(safe-area-inset-bottom, 24px);
    }

    .card {
      background: var(--color-surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 32px;
      width: 100%;
      max-width: 440px;
      margin-top: 24px;
    }

    .logo {
      text-align: center;
      margin-bottom: 24px;
    }
    .logo-text {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--color-primary);
    }

    h1 { font-size: 1.5rem; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: var(--color-muted); font-size: .9rem; margin-bottom: 28px; }

    .row { display: flex; gap: 12px; }
    .row .form-group { flex: 1; }

    .form-group { margin-bottom: 16px; }
    label { display: block; font-size: .875rem; font-weight: 500; margin-bottom: 6px; }

    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--color-border);
      border-radius: 8px;
      font-size: 1rem;
      color: var(--color-text);
      background: var(--color-surface);
      transition: border-color .15s;
      outline: none;
    }
    input:focus { border-color: var(--color-primary); }
    input.error  { border-color: var(--color-error); }
    input::placeholder { color: var(--color-muted); }

    .field-error {
      color: var(--color-error);
      font-size: .75rem;
      margin-top: 4px;
      display: none;
    }
    .field-error.visible { display: block; }

    .error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: var(--color-error);
      font-size: .875rem;
      padding: 10px 14px;
      margin-bottom: 18px;
      display: none;
    }
    .error-banner.visible { display: block; }
    .error-banner ul { padding-left: 18px; }

    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      margin-top: 8px;
    }
    .btn:hover { background: var(--color-primary-hover); }
    .btn:disabled { opacity: .65; cursor: not-allowed; }

    .terms {
      font-size: .78rem;
      color: var(--color-muted);
      text-align: center;
      margin-top: 14px;
      line-height: 1.5;
    }
    .terms a { color: var(--color-primary); text-decoration: none; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 22px 0;
      color: var(--color-muted);
      font-size: .8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    .login-link { text-align: center; font-size: .9rem; color: var(--color-muted); }
    .login-link a { color: var(--color-primary); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-text">Meetings Managed</span>
    </div>

    <h1>Create your account</h1>
    <p class="subtitle">Start managing meetings smarter — free for 14 days.</p>

    <div id="errorBanner" class="error-banner" role="alert" aria-live="polite">
      <ul id="errorList"></ul>
    </div>

    <form id="signupForm" data-signup-form novalidate>
      <div class="row">
        <div class="form-group">
          <label for="firstName">First name</label>
          <input type="text" id="firstName" name="firstName"
                 placeholder="Jane"
                 autocomplete="given-name"
                 autocapitalize="words" />
          <span class="field-error" id="firstNameError"></span>
        </div>
        <div class="form-group">
          <label for="lastName">Last name</label>
          <input type="text" id="lastName" name="lastName"
                 placeholder="Smith"
                 autocomplete="family-name"
                 autocapitalize="words" />
          <span class="field-error" id="lastNameError"></span>
        </div>
      </div>

      <div class="form-group">
        <label for="email">Work email <span style="color:var(--color-error)">*</span></label>
        <input type="email" id="email" name="email"
               placeholder="jane@company.com"
               autocomplete="email"
               autocapitalize="none"
               required />
        <span class="field-error" id="emailError"></span>
      </div>

      <div class="form-group">
        <label for="password">Password <span style="color:var(--color-error)">*</span></label>
        <input type="password" id="password" name="password"
               placeholder="Min. 8 characters"
               autocomplete="new-password"
               required />
        <span class="field-error" id="passwordError"></span>
      </div>

      <div class="form-group">
        <label for="confirmPassword">Confirm password <span style="color:var(--color-error)">*</span></label>
        <input type="password" id="confirmPassword" name="confirmPassword"
               placeholder="Repeat your password"
               autocomplete="new-password"
               required />
        <span class="field-error" id="confirmPasswordError"></span>
      </div>

      <button type="submit" class="btn" id="submitBtn">Create Account</button>

      <p class="terms">
        By signing up you agree to our
        <a href="/terms">Terms of Service</a> and
        <a href="/privacy">Privacy Policy</a>.
      </p>
    </form>

    <div class="divider">or</div>

    <p class="login-link">
      Already have an account? <a href="/login">Log in</a>
    </p>
  </div>

  <script src="auth-bridge.js"></script>
  <script>
    (function () {
      'use strict';

      var MIN_PW = 8;
      var EMAIL_RE = /^[^\s@]+@[^\s@]+\.[^\s@]{2,}$/;

      var form    = document.getElementById('signupForm');
      var banner  = document.getElementById('errorBanner');
      var errList = document.getElementById('errorList');
      var btn     = document.getElementById('submitBtn');

      function fieldEl(id)      { return document.getElementById(id); }
      function errEl(id)        { return document.getElementById(id + 'Error'); }
      function val(id)          { return fieldEl(id).value.trim(); }

      function setFieldError(id, msg) {
        var el = errEl(id);
        el.textContent = msg;
        el.classList.toggle('visible', !!msg);
        fieldEl(id).classList.toggle('error', !!msg);
      }

      function showBannerErrors(errors) {
        errList.innerHTML = errors.map(function (e) { return '<li>' + e + '</li>'; }).join('');
        banner.classList.add('visible');
      }
      function clearBanner() {
        errList.innerHTML = '';
        banner.classList.remove('visible');
      }

      function validate() {
        var errors = [];
        ['firstName','lastName','email','password','confirmPassword'].forEach(function (id) {
          setFieldError(id, '');
        });

        var email = val('email');
        if (!email) {
          setFieldError('email', 'Email is required.');
          errors.push('Email is required.');
        } else if (!EMAIL_RE.test(email)) {
          setFieldError('email', 'Enter a valid email address.');
          errors.push('Enter a valid email address.');
        }

        var pw = fieldEl('password').value;
        if (!pw) {
          setFieldError('password', 'Password is required.');
          errors.push('Password is required.');
        } else if (pw.length < MIN_PW) {
          setFieldError('password', 'Password must be at least ' + MIN_PW + ' characters.');
          errors.push('Password must be at least ' + MIN_PW + ' characters.');
        }

        var cpw = fieldEl('confirmPassword').value;
        if (cpw !== pw) {
          setFieldError('confirmPassword', 'Passwords do not match.');
          errors.push('Passwords do not match.');
        }

        var fn = val('firstName');
        if (fn && fn.length < 2) {
          setFieldError('firstName', 'Must be at least 2 characters.');
          errors.push('First name must be at least 2 characters.');
        }
        var ln = val('lastName');
        if (ln && ln.length < 2) {
          setFieldError('lastName', 'Must be at least 2 characters.');
          errors.push('Last name must be at least 2 characters.');
        }

        return errors;
      }

      form.addEventListener('submit', function (evt) {
        evt.preventDefault();
        clearBanner();

        var errors = validate();
        if (errors.length) {
          showBannerErrors(errors);
          return;
        }

        btn.disabled    = true;
        btn.textContent = 'Creating account…';

        if (typeof AuthBridge !== 'undefined') {
          AuthBridge.notifySignupSuccess({ email: val('email') });
        }

        form.submit();
      });
    })();
  </script>
</body>
</html>
