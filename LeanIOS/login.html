<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <meta name="description" content="Log in to Meetings Managed" />
  <title>Log In – Meetings Managed</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --color-bg:       #f5f7fa;
      --color-surface:  #ffffff;
      --color-primary:  #2563eb;
      --color-primary-hover: #1d4ed8;
      --color-text:     #111827;
      --color-muted:    #6b7280;
      --color-border:   #d1d5db;
      --color-error:    #dc2626;
      --radius:         12px;
      --shadow:         0 4px 24px rgba(0,0,0,.08);
    }

    @media (prefers-color-scheme: dark) {
      :root {
        --color-bg:      #0f172a;
        --color-surface: #1e293b;
        --color-text:    #f1f5f9;
        --color-muted:   #94a3b8;
        --color-border:  #334155;
      }
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: var(--color-bg);
      color: var(--color-text);
      min-height: 100dvh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: env(safe-area-inset-top, 16px) 16px env(safe-area-inset-bottom, 16px);
    }

    .card {
      background: var(--color-surface);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 40px 32px;
      width: 100%;
      max-width: 420px;
    }

    .logo {
      text-align: center;
      margin-bottom: 28px;
    }
    .logo img { height: 40px; }
    .logo-text {
      font-size: 1.4rem;
      font-weight: 700;
      color: var(--color-primary);
    }

    h1 {
      font-size: 1.5rem;
      font-weight: 700;
      margin-bottom: 4px;
    }
    .subtitle {
      color: var(--color-muted);
      font-size: .9rem;
      margin-bottom: 28px;
    }

    .form-group { margin-bottom: 18px; }
    label {
      display: block;
      font-size: .875rem;
      font-weight: 500;
      margin-bottom: 6px;
    }
    input {
      width: 100%;
      padding: 11px 14px;
      border: 1.5px solid var(--color-border);
      border-radius: 8px;
      font-size: 1rem;
      color: var(--color-text);
      background: var(--color-surface);
      transition: border-color .15s;
      outline: none;
    }
    input:focus { border-color: var(--color-primary); }
    input::placeholder { color: var(--color-muted); }

    .forgot {
      text-align: right;
      margin-top: 4px;
    }
    .forgot a {
      font-size: .8rem;
      color: var(--color-primary);
      text-decoration: none;
    }

    .error-banner {
      background: #fef2f2;
      border: 1px solid #fecaca;
      border-radius: 8px;
      color: var(--color-error);
      font-size: .875rem;
      padding: 10px 14px;
      margin-bottom: 18px;
      display: none;
    }
    .error-banner.visible { display: block; }

    .btn {
      display: block;
      width: 100%;
      padding: 13px;
      background: var(--color-primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s;
      margin-top: 8px;
    }
    .btn:hover { background: var(--color-primary-hover); }
    .btn:disabled { opacity: .65; cursor: not-allowed; }

    .divider {
      display: flex;
      align-items: center;
      gap: 12px;
      margin: 24px 0;
      color: var(--color-muted);
      font-size: .8rem;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--color-border);
    }

    .signup-link {
      text-align: center;
      font-size: .9rem;
      color: var(--color-muted);
    }
    .signup-link a { color: var(--color-primary); text-decoration: none; font-weight: 500; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">
      <span class="logo-text">Meetings Managed</span>
    </div>

    <h1>Welcome back</h1>
    <p class="subtitle">Sign in to your account to continue.</p>

    <div id="errorBanner" class="error-banner" role="alert" aria-live="polite"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" name="email"
               placeholder="you@example.com"
               autocomplete="email"
               autocapitalize="none"
               required />
      </div>

      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" name="password"
               placeholder="••••••••"
               autocomplete="current-password"
               required />
        <div class="forgot">
          <a href="/forgot-password">Forgot password?</a>
        </div>
      </div>

      <button type="submit" class="btn" id="submitBtn">Log In</button>
    </form>

    <div class="divider">or</div>

    <p class="signup-link">
      Don't have an account? <a href="/signup">Sign up free</a>
    </p>
  </div>

  <script src="auth-bridge.js"></script>
  <script>
    (function () {
      'use strict';

      var form   = document.getElementById('loginForm');
      var banner = document.getElementById('errorBanner');
      var btn    = document.getElementById('submitBtn');

      function showError(msg) {
        banner.textContent = msg;
        banner.classList.add('visible');
      }
      function clearError() {
        banner.textContent = '';
        banner.classList.remove('visible');
      }

      form.addEventListener('submit', function (evt) {
        evt.preventDefault();
        clearError();

        var email    = document.getElementById('email').value.trim();
        var password = document.getElementById('password').value;

        if (!email) { showError('Email is required.'); return; }
        if (!/^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email)) { showError('Enter a valid email address.'); return; }
        if (!password) { showError('Password is required.'); return; }

        btn.disabled    = true;
        btn.textContent = 'Signing in…';

        // Submit natively — the native layer handles the response.
        form.submit();
      });
    })();
  </script>
</body>
</html>
